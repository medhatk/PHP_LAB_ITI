<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
</head>
<body>
    <h1>Registration Form</h1>
    <hr>
    <form action="review.php" method="post">

        <label for="FirstName">First Name:</label>
        <input type="text" id="FirstName" name="FirstName" placeholder="First Name">

        <label for="LastName">Last Name:</label>
        <input type="text" id="LastName" name="LastName" placeholder="Last Name">

        <label for="address">Address:</label>
        <input type="text" id="address" name="address" placeholder="Address">

        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="">Select Country</option>
            <option value="Egypt">Egypt</option>
            <option value="Saudi Arabia">Saudi Arabia</option>
            <option value="UAE">UAE</option>
            <option value="US">US</option>
            <option value="UK">UK</option>
        </select>

        <label>Gender:</label>
        <label>
            <input type="radio" name="gender" value="Male"> Male
        </label>
        <label >
            <input type="radio" name="gender" value="Female"> Female
        </label>

        <label>Skills:</label>
        <label>
            <input type="checkbox" name="php" value="PHP"> PHP
        </label>
        <label>
            <input type="checkbox" name="j2se" value="J2SE"> J2SE
        </label>
        <label>
            <input type="checkbox" name="mysql" value="MySQL"> MySQL
        </label>
        <label>
            <input type="checkbox" name="postgresql" value="PostgreSQL"> PostgreSQL
        </label>

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Username">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Email">

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Password">

        <label for="Department">Department:</label>
        <input type="text" id="Department" name="Department" value="OpenSource" readonly>

        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>
</body>
</html>
